services:
  - type: web
    name: nuroscan-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nuroscan-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app # Update this later

databases:
  - name: nuroscan-db
    plan: free
