services:
  - type: web
    name: nuroscan-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel URL
      - key: PYTHON_VERSION
        value: 3.11.0
