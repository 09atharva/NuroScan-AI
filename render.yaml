services:
  - type: web
    name: NuroScan-AI-Backend
    runtime: python
    repo: https://github.com/09atharva/NuroScan-AI
    plan: free
    region: oregon
    # This is the key fix:
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nuroscan-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app

databases:
  - name: nuroscan-db
    plan: free
    region: oregon
